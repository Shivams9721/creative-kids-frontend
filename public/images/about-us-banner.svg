<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 560" width="1440" height="560">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f6f5f3;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#fdf0f3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fce8ed;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E2889D;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#f5c6d0;stop-opacity:0.08" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="560" fill="url(#bgGrad)" />

  <!-- Decorative circles -->
  <circle cx="100" cy="80" r="180" fill="url(#circleGrad)" />
  <circle cx="1380" cy="500" r="220" fill="url(#circleGrad)" />
  <circle cx="1300" cy="60" r="80" fill="#E2889D" fill-opacity="0.07" />
  <circle cx="200" cy="480" r="60" fill="#E2889D" fill-opacity="0.09" />

  <!-- Floating star dots -->
  <circle cx="360" cy="120" r="4" fill="#E2889D" fill-opacity="0.4" />
  <circle cx="400" cy="160" r="2.5" fill="#E2889D" fill-opacity="0.3" />
  <circle cx="320" cy="150" r="3" fill="#E2889D" fill-opacity="0.25" />
  <circle cx="1080" cy="100" r="4" fill="#E2889D" fill-opacity="0.4" />
  <circle cx="1120" cy="140" r="2.5" fill="#E2889D" fill-opacity="0.3" />
  <circle cx="1060" cy="430" r="3.5" fill="#E2889D" fill-opacity="0.3" />
  <circle cx="380" cy="430" r="3" fill="#E2889D" fill-opacity="0.25" />

  <!-- Thin horizontal accent line -->
  <line x1="580" y1="195" x2="860" y2="195" stroke="#E2889D" stroke-width="1" stroke-opacity="0.35" />
  <line x1="580" y1="370" x2="860" y2="370" stroke="#E2889D" stroke-width="1" stroke-opacity="0.35" />

  <!-- Subtitle -->
  <text x="720" y="240" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="13" font-weight="400" fill="#E2889D" fill-opacity="0.9" letter-spacing="6" text-anchor="middle" text-transform="uppercase">A B O U T  U S</text>

  <!-- Main title -->
  <text x="720" y="308" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="52" font-weight="300" fill="#1a1a1a" letter-spacing="4" text-anchor="middle">Our Story</text>

  <!-- Description -->
  <text x="720" y="348" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="300" fill="#555" letter-spacing="1" text-anchor="middle">Crafting joy for little ones, one stitch at a time.</text>

  <!-- CTA border button -->
  <rect x="620" y="388" width="200" height="40" rx="0" fill="none" stroke="#1a1a1a" stroke-width="1.2" />
  <text x="720" y="413" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#1a1a1a" letter-spacing="3" text-anchor="middle">LEARN MORE</text>

  <!-- Small brand mark bottom -->
  <text x="720" y="510" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="300" fill="#aaa" letter-spacing="5" text-anchor="middle">CREATIVE KIDS</text>
</svg>
