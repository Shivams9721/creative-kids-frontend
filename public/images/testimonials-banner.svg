<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 560" width="1440" height="560">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d1a2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E2889D;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#f5c6d0;stop-opacity:0.04" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#E2889D;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#E2889D;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="560" fill="url(#bgGrad)" />

  <!-- Center radial glow -->
  <ellipse cx="720" cy="280" rx="500" ry="300" fill="url(#centerGlow)" />

  <!-- Decorative circles -->
  <circle cx="80" cy="100" r="200" fill="url(#glowGrad)" />
  <circle cx="1400" cy="480" r="240" fill="url(#glowGrad)" />
  <circle cx="1350" cy="80" r="90" fill="#E2889D" fill-opacity="0.06" />
  <circle cx="150" cy="460" r="70" fill="#E2889D" fill-opacity="0.07" />

  <!-- Star / sparkle dots -->
  <circle cx="340" cy="110" r="3.5" fill="#E2889D" fill-opacity="0.5" />
  <circle cx="380" cy="145" r="2" fill="#f5c6d0" fill-opacity="0.4" />
  <circle cx="310" cy="155" r="2.5" fill="#E2889D" fill-opacity="0.35" />
  <circle cx="1100" cy="95" r="3.5" fill="#E2889D" fill-opacity="0.5" />
  <circle cx="1140" cy="130" r="2" fill="#f5c6d0" fill-opacity="0.4" />
  <circle cx="1070" cy="420" r="3" fill="#E2889D" fill-opacity="0.4" />
  <circle cx="370" cy="420" r="2.5" fill="#E2889D" fill-opacity="0.3" />
  <circle cx="720" cy="90" r="2" fill="#f5c6d0" fill-opacity="0.35" />
  <circle cx="730" cy="475" r="2" fill="#f5c6d0" fill-opacity="0.3" />

  <!-- Thin quote marks -->
  <text x="600" y="270" font-family="Georgia, serif" font-size="80" fill="#E2889D" fill-opacity="0.12" text-anchor="middle">"</text>
  <text x="840" y="350" font-family="Georgia, serif" font-size="80" fill="#E2889D" fill-opacity="0.12" text-anchor="middle">"</text>

  <!-- Thin horizontal accent lines -->
  <line x1="560" y1="198" x2="880" y2="198" stroke="#E2889D" stroke-width="1" stroke-opacity="0.3" />
  <line x1="560" y1="380" x2="880" y2="380" stroke="#E2889D" stroke-width="1" stroke-opacity="0.3" />

  <!-- Subtitle -->
  <text x="720" y="243" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="12" font-weight="400" fill="#E2889D" fill-opacity="0.85" letter-spacing="6" text-anchor="middle">T E S T I M O N I A L S</text>

  <!-- Main title -->
  <text x="720" y="310" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="50" font-weight="300" fill="#ffffff" letter-spacing="4" text-anchor="middle">What Parents Say</text>

  <!-- Description -->
  <text x="720" y="350" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="15" font-weight="300" fill="#cccccc" letter-spacing="1" text-anchor="middle">Loved by families, trusted by little ones everywhere.</text>

  <!-- CTA border button -->
  <rect x="610" y="390" width="220" height="42" rx="0" fill="none" stroke="#E2889D" stroke-width="1.2" stroke-opacity="0.8" />
  <text x="720" y="416" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#E2889D" letter-spacing="3" text-anchor="middle">READ REVIEWS</text>

  <!-- Small brand mark bottom -->
  <text x="720" y="510" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-size="11" font-weight="300" fill="#666" letter-spacing="5" text-anchor="middle">CREATIVE KIDS</text>
</svg>
