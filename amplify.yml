version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
        # Amplify Console env vars don't auto-flow into Next.js builds.
        # Write them into .env.production so Next.js picks them up at build time
        # (middleware bundles inline these via Webpack DefinePlugin).
        - |
          : > .env.production
          for var in ADMIN_GATE_KEY ADMIN_GATE_SECRET CSRF_SECRET NEXT_PUBLIC_API_URL NEXT_PUBLIC_CDN_HOST NEXT_PUBLIC_TURNSTILE_SITE_KEY NEXT_PUBLIC_AWS_REGION NEXT_PUBLIC_S3_BUCKET_NAME; do
            if [ -n "${!var}" ]; then
              echo "$var=${!var}" >> .env.production
              echo "wrote $var to .env.production"
            else
              echo "skipped $var (not set in Amplify env)"
            fi
          done
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - .npm/**/*
      - node_modules/**/*
      - .next/cache/**/*
